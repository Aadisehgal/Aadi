name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK platforms / build-tools
      run: |
        yes | sdkmanager --licenses >/dev/null 2>&1 || true
        sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Patch subproject build.gradle files
      run: |
        for f in \
          node_modules/react-native-gesture-handler/android/build.gradle \
          node_modules/react-native-reanimated/android/build.gradle \
          node_modules/react-native-safe-area-context/android/build.gradle ; do
          if [ -f "$f" ]; then
            sed -i "s|['\"]com\.facebook\.react:react-native:+['\"]|'com.facebook.react:react-android:0.74.3'|g" "$f"
            sed -i "s|['\"]com\.facebook\.react:react-native:[^'\"]*['\"]|'com.facebook.react:react-android:0.74.3'|g" "$f"
            sed -i "s|['\"]com\.facebook\.react:react-android['\"]|'com.facebook.react:react-android:0.74.3'|g" "$f"
          fi
        done

    - name: Create debug keystore
      run: |
        cd android/app
        keytool -genkey -v -keystore debug.keystore \
          -storepass android -alias androiddebugkey \
          -keypass android -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Build JS Bundle
      run: |
        mkdir -p android/app/src/main/assets
        npx react-native bundle \
          --platform android \
          --dev false \
          --entry-file index.js \
          --bundle-output android/app/src/main/assets/index.android.bundle \
          --assets-dest android/app/src/main/res
        echo "Bundle size: $(ls -lh android/app/src/main/assets/index.android.bundle)"

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: manu-ai-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Build Logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android/app/build/outputs/logs
          android/build
        if-no-files-found: ignore
        retention-days: 7
